apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-platform-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: monitoring
data:
  ml-model-performance.json: |
    {
      "title": "ML Model Performance",
      "uid": "ml-model-perf",
      "tags": ["ml-platform", "serving"],
      "timezone": "utc",
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (rps)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "ml:model_request_rate:rate5m",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Latency Percentiles (ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "ml:model_request_latency_p50:rate5m * 1000",
              "legendFormat": "p50 {{service}}"
            },
            {
              "expr": "ml:model_request_latency_p95:rate5m * 1000",
              "legendFormat": "p95 {{service}}"
            },
            {
              "expr": "ml:model_request_latency_p99:rate5m * 1000",
              "legendFormat": "p99 {{service}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "ml:model_error_rate:rate5m",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "GPU Utilization",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "ml:gpu_utilization:avg5m",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  {"value": 0, "color": "green"},
                  {"value": 0.8, "color": "yellow"},
                  {"value": 0.95, "color": "red"}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Prediction Drift (PSI)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "ml_model_prediction_drift_psi",
              "legendFormat": "{{model_name}} v{{model_version}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Pipeline Success Rate (24h)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [
            {
              "expr": "ml:pipeline_success_rate:rate24h",
              "legendFormat": "{{pipeline_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  {"value": 0, "color": "red"},
                  {"value": 0.8, "color": "yellow"},
                  {"value": 0.95, "color": "green"}
                ]
              }
            }
          }
        }
      ]
    }
