apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-platform-quota
  namespace: ml-platform
  labels:
    app.kubernetes.io/component: resource-management
spec:
  hard:
    # GPU limits
    requests.nvidia.com/gpu: "32"
    limits.nvidia.com/gpu: "32"
    # CPU limits
    requests.cpu: "256"
    limits.cpu: "512"
    # Memory limits
    requests.memory: "1Ti"
    limits.memory: "2Ti"
    # Storage limits
    requests.storage: "50Ti"
    persistentvolumeclaims: "100"
    # Object count limits
    pods: "500"
    services: "50"
    secrets: "200"
    configmaps: "200"
    replicationcontrollers: "0"
    count/deployments.apps: "50"
    count/statefulsets.apps: "20"
    count/jobs.batch: "100"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-platform-training-quota
  namespace: ml-platform
  labels:
    app.kubernetes.io/component: resource-management
    quota-class: training
spec:
  hard:
    requests.nvidia.com/gpu: "16"
    limits.nvidia.com/gpu: "16"
    requests.cpu: "128"
    limits.cpu: "256"
    requests.memory: "512Gi"
    limits.memory: "1Ti"
    count/jobs.batch: "50"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values:
          - training-high
          - training-low
