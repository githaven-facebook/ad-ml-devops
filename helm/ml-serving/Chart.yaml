apiVersion: v2
name: ml-serving
description: Helm chart for ad ML model serving infrastructure (User Persona + Autobid)
type: application
version: 1.4.0
appVersion: "1.2.5"
keywords:
  - ml-serving
  - bentoml
  - machine-learning
  - ads
home: https://github.com/fb-ads-ml/ad-ml-devops
sources:
  - https://github.com/fb-ads-ml/ad-ml-devops
maintainers:
  - name: ml-platform
    email: ml-platform-oncall@fb.com
annotations:
  meta.fb.com/team: ml-platform
  meta.fb.com/service: ad-ml-serving
dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
