# Production environment overrides for ml-serving Helm chart.

replicaCount: 4

image:
  tag: stable

resources:
  requests:
    cpu: "4"
    memory: "16Gi"
    nvidia.com/gpu: "1"
  limits:
    cpu: "8"
    memory: "32Gi"
    nvidia.com/gpu: "1"

autoscaling:
  enabled: true
  minReplicas: 4
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  customMetrics:
    - name: bentoml_request_duration_seconds_p99
      target: 0.08
    - name: bentoml_runner_queue_size
      target: 30

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  annotations:
    nginx.ingress.kubernetes.io/rate-limit-connections: "500"
    nginx.ingress.kubernetes.io/rate-limit-rps: "5000"
  hosts:
    - host: ml-serving.ads.fb.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ml-serving-prod-tls
      hosts:
        - ml-serving.ads.fb.com

model:
  version: Production

configmap:
  featureFlags:
    enable_response_caching: "true"
    cache_ttl_seconds: "5"
    enable_adaptive_batching: "true"
    max_batch_size: "512"
    enable_model_warmup: "true"

canary:
  enabled: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ml-serving
