service: "user_persona_service:svc"
name: "ad-ml-serving"
description: "Ad ML model serving: User Persona and Autobid models"

labels:
  team: ml-platform
  service: ad-ml-serving
  env: production

include:
  - "*.py"
  - "configuration.yaml"

python:
  packages:
    - torch==2.2.0
    - torchvision==0.17.0
    - mlflow==2.10.0
    - boto3==1.34.0
    - pandas==2.2.0
    - numpy==1.26.3
    - scipy==1.12.0
    - scikit-learn==1.4.0
    - prometheus-client==0.19.0
    - pydantic==2.5.3
  requirements_txt: "../requirements-serving.txt"
  lock_packages: true
  index_url: "https://pypi.org/simple"

docker:
  base_image: "nvcr.io/nvidia/cuda:12.1.0-cudnn8-runtime-ubuntu22.04"
  distro: debian
  python_version: "3.10"
  cuda_version: "12.1"
  system_packages:
    - libgomp1
    - libglib2.0-0
    - libgl1-mesa-glx
  setup_script: "./docker/setup_serving.sh"
  dockerfile_template: null
  user: bentoml

envs:
  - name: BENTOML_HOME
    value: /home/bentoml
  - name: OMP_NUM_THREADS
    value: "4"
  - name: TOKENIZERS_PARALLELISM
    value: "false"
  - name: CUDA_LAUNCH_BLOCKING
    value: "0"
